name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      # Lint and format only need to run once; Linux is canonical.
      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: pnpm format:check

      - name: Build
        run: pnpm -r build

      - name: Install xvfb (for Electron E2E)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Test (Linux, with xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a pnpm -r test

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm -r test
